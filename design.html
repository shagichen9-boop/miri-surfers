  function makeCanvasTex(text, w, h, bg, fg, fontSize) {
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const x = c.getContext('2d');
    if (bg) { x.fillStyle = bg; x.fillRect(0, 0, w, h); }
    x.fillStyle = fg || '#000';
    x.font = `bold ${fontSize || 32}px Arial`;
    x.textAlign = 'center'; x.textBaseline = 'middle';
    x.fillText(text, w / 2, h / 2);
    const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
  }

  // ─── Texture Creators ────────────────────────────────────────────────────────
  function createAvatarHeadTexture() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 256;
    const ctx = c.getContext('2d');
    const img = new Image(); img.crossOrigin = 'anonymous';
    const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
    function drawFallback() {
      ctx.fillStyle = '#E8B89D';
      ctx.beginPath(); ctx.arc(128, 128, 124, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#333'; ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Miri', 128, 128);
    }
    function draw() {
      ctx.clearRect(0, 0, 256, 256);
      ctx.save();
      ctx.beginPath(); ctx.arc(128, 128, 124, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
      if (img.naturalWidth && img.naturalHeight) {
        const iw = img.naturalWidth, ih = img.naturalHeight;
        const faceScale = 1.6;
        const sw = iw / faceScale, sh = ih / faceScale;
        const sx = (iw - sw) / 2, sy = (ih - sh) * 0.2;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 256, 256);
      } else { drawFallback(); }
      ctx.restore();
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.arc(128, 128, 121, 0, Math.PI * 2); ctx.stroke();
      tex.needsUpdate = true;
    }
    draw(); img.onload = draw; img.onerror = draw; img.src = 'miri.png';
    return tex;
  }

  function createNetanyahuHeadTexture() {
    const size = 512;
    const c = document.createElement('canvas'); c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const img = new Image(); img.crossOrigin = 'anonymous';
    const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
    const cx = size / 2, r = size / 2 - 4;
    function draw() {
      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = '#e8c8a0';
      ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2); ctx.fill();
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
      if (img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, 0, 0, size, size);
      } else {
        ctx.fillStyle = '#333'; ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Bibi', cx, cx);
      }
      ctx.restore();
      ctx.strokeStyle = '#003399'; ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(cx, cx, r - 4, 0, Math.PI * 2); ctx.stroke();
      tex.needsUpdate = true;
    }
    img.onload = draw; img.onerror = draw; img.src = 'netanyahu.png'; draw();
    return tex;
  }

  function createLapidHeadTexture() {
    const size = 512;
    const c = document.createElement('canvas'); c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const img = new Image(); img.crossOrigin = 'anonymous';
    const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
    const cx = size / 2, r = size / 2 - 4;
    function draw() {
      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = '#e8d0b0';
      ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2); ctx.fill();
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
      if (img.complete && img.naturalWidth > 0) {
        const iw = img.naturalWidth, ih = img.naturalHeight;
        const tmp = document.createElement('canvas');
        tmp.width = size; tmp.height = size;
        const tc = tmp.getContext('2d');
        tc.drawImage(img, 0, 0, iw, ih, 0, 0, size, size);
        const bgSample = tc.getImageData(4, 4, 1, 1).data;
        const [br, bg, bb] = [bgSample[0], bgSample[1], bgSample[2]];
        const imgData = tc.getImageData(0, 0, size, size);
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
          const dr = d[i] - br, dg = d[i + 1] - bg, db = d[i + 2] - bb;
          if (Math.sqrt(dr * dr + dg * dg + db * db) < 55) d[i + 3] = 0;
        }
        tc.putImageData(imgData, 0, 0);
        ctx.drawImage(tmp, 0, 0);
      } else {
        ctx.fillStyle = '#333'; ctx.font = 'bold 56px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Lapid', cx, cx);
      }
      ctx.restore();
      ctx.strokeStyle = '#2255cc'; ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(cx, cx, r - 4, 0, Math.PI * 2); ctx.stroke();
      tex.needsUpdate = true;
    }
    img.onload = draw; img.onerror = draw; img.src = 'lapid.png'; draw();
    return tex;
  }

  function createGantzWindshieldTexture() {
    // Canvas matches front-face plane ratio: BW=3.8, frontH=4.05 → ~0.938:1
    const W = 512, H = 546;
    const c = document.createElement('canvas'); c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    const img = new Image(); img.crossOrigin = 'anonymous';
    const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      if (img.naturalWidth && img.naturalHeight) {
        const iw = img.naturalWidth, ih = img.naturalHeight;
        // "cover" — fill canvas preserving aspect ratio, cropping edges if needed
        const scale = Math.max(W / iw, H / ih);
        const sw = iw * scale, sh = ih * scale;
        const dx = (W - sw) / 2, dy = (H - sh) / 2;
        ctx.drawImage(img, dx, dy, sw, sh);
      } else {
        ctx.fillStyle = '#c8a882'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#333'; ctx.font = 'bold 38px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Gantz', W / 2, H / 2);
      }
      tex.needsUpdate = true;
    }
    draw(); img.onload = draw; img.onerror = draw; img.src = 'gantz.png';
    return tex;
  }

  function createGun() {
    const g = new THREE.Group();

    const mat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.45 });
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.2 * s, 0.5 * s, 0.22 * s), mat);
    grip.position.set(0, -0.1 * s, 0.06 * s); grip.rotation.x = 0.28; g.add(grip);
    const guard = new THREE.Mesh(new THREE.BoxGeometry(0.15 * s, 0.1 * s, 0.2 * s), mat);
    guard.position.set(0, 0.06 * s, -0.08 * s); g.add(guard);
    const slide = new THREE.Mesh(new THREE.BoxGeometry(0.17 * s, 0.12 * s, 0.5 * s), mat);
    slide.position.set(0, 0.16 * s, -0.35 * s); g.add(slide);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.045 * s, 0.05 * s, 0.28 * s, 8), mat);
    barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.18 * s, -0.65 * s); g.add(barrel);
    return g;
  }

  function createRideableScooter() {
    const g = new THREE.Group();
    const deckMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5 });
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
    const deck = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.08, 0.32), deckMat);
    g.add(deck);
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.04, 0.55, 8), deckMat);
    stem.rotation.x = Math.PI / 2; stem.position.set(0, 0.35, 0.08); g.add(stem);
    const handlebar = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.35, 8), deckMat);
    handlebar.rotation.z = Math.PI / 2; handlebar.position.set(0, 0.58, 0.08); g.add(handlebar);
    for (const side of [-1, 1]) {
      const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 12), wheelMat);
      wheel.rotation.x = Math.PI / 2; wheel.position.set(side * 0.28, -0.02, 0); g.add(wheel);

  function createRoadblock(openLane) {
    const g = new THREE.Group();
    const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
    const brownMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.8 });
    const laneXs = [-3, 0, 3];
    laneXs.forEach((px, i) => {
      if (i === openLane) return;
      for (let t = 0; t < 2; t++) {
        const tire = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.18, 8, 14), blackMat);
        tire.rotation.x = Math.PI / 2; tire.position.set(px, 0.22 + t * 0.55, 0); g.add(tire);
      }
      const plank = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.18, 0.14), brownMat);
      plank.position.set(px, 1.55, 0); g.add(plank);
      for (let f = 0; f < 3; f++) {
        const hue = f % 2 === 0 ? 0xff4400 : 0xffaa00;
        const flameMat = new THREE.MeshStandardMaterial({
          color: hue, emissive: hue, emissiveIntensity: 1.2, transparent: true, opacity: 0.85
        });
        const flame = new THREE.Mesh(new THREE.ConeGeometry(0.28 - f * 0.04, 1.8 + f * 0.5, 6), flameMat);
        flame.position.set(px + (f - 1) * 0.28, 1.8 + f * 0.35, 0.05); g.add(flame);
      }
    });
    const arrowLabels = ['← GO', '↑ GO', 'GO →'];
    const arrowTex = makeCanvasTex(arrowLabels[openLane], 256, 96, null, '#00ff88', 52);
    const arrowSign = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.65),
      new THREE.MeshBasicMaterial({ map: arrowTex, transparent: true, side: THREE.DoubleSide }));
    arrowSign.position.set(laneXs[openLane], 3.2, 0); g.add(arrowSign);
    return g;
  }

  function createProtester() {
    const g = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xe0b090, roughness: 0.7 });
    const shirtCol = shirtColors[Math.floor(Math.random() * shirtColors.length)];
    const shirtMat = new THREE.MeshStandardMaterial({ color: shirtCol, roughness: 0.6 });
    const pantsMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.7 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 10), skinMat);
    head.position.y = 3.1; g.add(head);
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.4), shirtMat);
    torso.position.y = 2.1; g.add(torso);
    for (const s of [-1, 1]) {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.24, 1.0, 0.28), pantsMat);
      leg.position.set(s * 0.2, 1.0, 0); g.add(leg);
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.0, 0.2), shirtMat);
      arm.position.set(s * 0.5, 2.2, 0); arm.rotation.z = s * 0.15; g.add(arm);
    }
    return g;
  }

  function createProtesterRoadblock() {
    const g = new THREE.Group();
    const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 });
    const whiteMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.6 });
    const skinMat  = new THREE.MeshStandardMaterial({ color: 0xe0b090, roughness: 0.7 });
    const laneXs = [-3, 0, 3];
    laneXs.forEach(px => {
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.42, 0.9, 8), blackMat);
      torso.position.set(px, 0.6, 0); torso.rotation.x = 0.25; g.add(torso);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.34, 10, 10), skinMat);
      head.position.set(px, 1.25, 0.1); g.add(head);
      const beard = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.18, 0.45, 8), whiteMat);
      beard.position.set(px, 0.95, 0.28); beard.rotation.x = -0.2; g.add(beard);
      const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.29, 0.38, 10), blackMat);
      crown.position.set(px, 1.68, 0.05); g.add(crown);
      const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.52, 0.06, 14), blackMat);
      brim.position.set(px, 1.51, 0.05); g.add(brim);
      for (const s of [-1, 1]) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.15, 0.22), blackMat);
        leg.position.set(px + s * 0.18, 0.12, s * 0.18); leg.rotation.y = s * 0.7; g.add(leg);
      }
      const stickMat = new THREE.MeshStandardMaterial({ color: 0x886633, roughness: 0.9 });
      const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.5, 8), stickMat);
      stick.position.set(px, 1.6, 0.12); g.add(stick);
      const signTex = makeCanvasTex('לא נגיע!', 256, 128, '#223399', '#ffffff', 52);
      const sign = new THREE.Mesh(new THREE.PlaneGeometry(1.1, 0.55),
        new THREE.MeshBasicMaterial({ map: signTex, transparent: true, side: THREE.DoubleSide }));
      sign.position.set(px, 2.2, 0.12); g.add(sign);
    });
    const bannerTex = makeCanvasTex('לא לגיוס — לא לגיוס', 512, 96, '#cc0000', '#ffffff', 52);
    const banner = new THREE.Mesh(new THREE.PlaneGeometry(6.5, 0.55),
      new THREE.MeshBasicMaterial({ map: bannerTex, transparent: true, side: THREE.DoubleSide }));
    banner.position.set(0, 2.55, 0.12); g.add(banner);
    return g;
  }

  // ─── Label Helper ─────────────────────────────────────────────────────────────
  function makeLabel(text) {
    const W = 512, H = 80;
    const c = document.createElement('canvas'); c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgba(10,10,30,0.82)';
    ctx.beginPath();
    const r = 16;
    ctx.moveTo(r, 0); ctx.lineTo(W - r, 0);
    ctx.quadraticCurveTo(W, 0, W, r);
    ctx.lineTo(W, H - r); ctx.quadraticCurveTo(W, H, W - r, H);
    ctx.lineTo(r, H); ctx.quadraticCurveTo(0, H, 0, H - r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, W / 2, H / 2);
    const tex = new THREE.CanvasTexture(c);
    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(3.8, 0.6),
      new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
    );
    return plane;
  }

  // ─── Place All Objects ────────────────────────────────────────────────────────
  const items = []; // { mesh, x, label }

  function addItem(mesh, x, labelText, labelY) {
    mesh.position.set(x, 0, 0);
    scene.add(mesh);
    const lbl = makeLabel(labelText);
    lbl.position.set(x, labelY !== undefined ? labelY : 7.2, 0.5);
    scene.add(lbl);
    items.push({ mesh, x, label: labelText });
  }

  // Characters
  addItem(createMiriCharacter(), 0,   'Miri (שחקן)', 5.0);
  addItem(createNetanyahu(),      10,  'ביבי נתניהו', 5.8);
  addItem(createOldMan(),         20,  'מפקח מחמושן', 5.8);
  addItem(createChaserInspector(),30,  'לפיד - מרדף', 5.5);
  addItem(createGoldknopf(),      42,  'גולדקנופף',   6.6);

  // Large obstacles
  addItem(createGiantRabbi(),     62,  'הרב הענק', 8.8);
  addItem(createGantzCar(),       80,  'מכונית גנץ', 8.5);
  const bus = createBus(0);
  addItem(bus,                    93,  'אוטובוס (אגד)', 4.4);
  addItem(createTrain(),          110, 'רכבת',       4.8);

  // Road obstacles
  addItem(createPoliceBarrier(),  127, 'מחסום משטרה', 3.8);
  addItem(createRoadblock(1),     143, 'מחסום בוער',  4.5);
  addItem(createProtesterRoadblock(), 160, 'מחסום מפגינים', 3.8);

  // Platform plates under each object (visual anchor)
  items.forEach(({ x }) => {
    const plate = new THREE.Mesh(
      new THREE.BoxGeometry(9, 0.06, 10),
      new THREE.MeshStandardMaterial({ color: 0x1e2840, roughness: 0.8 })
    );
    plate.position.set(x, -0.02, 0);
    scene.add(plate);
  });

  // ─── Sidebar Interaction ──────────────────────────────────────────────────────
  const sidebarItems = document.querySelectorAll('.si');
  sidebarItems.forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const item = items[idx];
      if (!item) return;
      sidebarItems.forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      // Animate camera to focus on this item
      const tx = item.x, ty = 3, tz = 0;
      controls.target.set(tx, ty, tz);
      camera.position.set(tx, ty + 8, tz + 18);
      controls.update();
    });
  });

  // ─── Resize Handling ──────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ─── Render Loop ──────────────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
  </script>
</body>
</html>
